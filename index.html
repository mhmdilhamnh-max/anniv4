<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Abi 💙💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
overflow-x:hidden;
overflow-y:auto;
min-height:100vh;
color:#fff;
background:linear-gradient(-45deg,#60A5FA,#818CF8,#8B5CF6,#A855F7);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.slide{
display:none;
min-height:100vh;
align-items:center;
justify-content:center;
padding:40px 20px;
}

.slide.active{display:flex}

.card{
max-width:720px;
width:100%;
text-align:center;
background:rgba(255,255,255,.15);
backdrop-filter:blur(12px);
padding:25px;
border-radius:24px;
}

.gif,.photo,video{
width:220px;
height:220px;
object-fit:cover;
border-radius:20px;
margin-bottom:15px;
}

.pin{
display:flex;
gap:8px;
justify-content:center;
margin:15px 0;
}

.box{
width:42px;
height:52px;
background:#fff;
color:#6d28d9;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:1.5rem;
font-weight:600;
border:2px solid #6d28d9;
}

.keys{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
justify-content:center;
}

.keys button{
border:none;
border-radius:16px;
padding:12px;
cursor:pointer;
font-weight:600;
font-size:1.1rem;
}

.next,.back{
border:none;
padding:12px 24px;
border-radius:999px;
margin-top:15px;
cursor:pointer;
color:#6d28d9;
font-weight:600;
}

.slider{width:100%}

.desc{
font-size:1rem;
font-weight:400;
line-height:1.6;
margin-top:10px;
}

.note{
background:#fff;
color:#333;
padding:20px;
border-radius:18px;
text-align:left;
white-space:pre-wrap;
min-height:220px;
}

.small{font-size:12px;margin-top:10px}
</style>
</head>

<body>

<script>
const CONFIG={
password:"090623",
clue:"hari abi ilam 💙💜",
photo1:"foto3.jpg",
photo2:"foto2.jpg",
video6:"WhatsApp Video 2026-06-09 at 08.24.24.mp4",

slide4Text:"Inii pas pertama kali abi ilam ngedatee...",
slide5Text:"Terima kasih abii udah jadi bagian hidup ilamm...",
slide6Text:"Recap video setahun terakhir 💙💜",

letter:`Helooo abi 💙💜

Happy anniversary ke-3...
I love you Abiii!`
};
</script>

<!-- SLIDE 1 PIN -->
<div class="slide active" id="s1">
<div class="card">
<h1>Coba tebak passwordnya 💙</h1>

<div id="pin" class="pin"></div>
<div id="keys" class="keys"></div>

<p class="small" id="clue"></p>
</div>
</div>

<!-- SLIDES -->
<div class="slide" id="s2"><div class="card"><h1>Hai 👋</h1><button class="next" onclick="next()">Next</button></div></div>
<div class="slide" id="s3"><div class="card"><h1>Love meter 💕</h1><input id="love" type="range" min="0" max="100" value="50"><h2 id="loveText">50%</h2><button class="next" onclick="next()">Next</button></div></div>
<div class="slide" id="s4"><div class="card"><h1>Special day 💙</h1><button class="next" onclick="next()">Next</button></div></div>
<div class="slide" id="s5"><div class="card"><h1>Anniversary 💜</h1><button class="next" onclick="next()">Next</button></div></div>
<div class="slide" id="s6"><div class="card"><h1>Surprise 🎁</h1><button class="next" onclick="next()">Next</button></div></div>

<div class="slide" id="s7"><div class="card"><img id="p1" class="photo"><p id="d4"></p><button class="next" onclick="next()">Next</button></div></div>
<div class="slide" id="s8"><div class="card"><img id="p2" class="photo"><p id="d5"></p><button class="next" onclick="next()">Next</button></div></div>

<div class="slide" id="s9"><div class="card"><video id="video6" controls><source id="videoSource"></video><p id="d6"></p><button class="next" onclick="next()">Next</button></div></div>

<div class="slide" id="s10"><div class="card">
<h1>Music 🎵</h1>
<iframe id="spotify"></iframe>
<button class="next" onclick="next()">Next</button>
</div></div>

<div class="slide" id="s11"><div class="card">
<h1>Letter 💌</h1>
<div id="letter" class="note"></div>
<button class="back" onclick="location.reload()">Restart</button>
</div></div>

<script>
let current=1;
let p='';

const pin=document.getElementById('pin');
const keys=document.getElementById('keys');
const clue=document.getElementById('clue');

const p1=document.getElementById('p1');
const p2=document.getElementById('p2');

const d4=document.getElementById('d4');
const d5=document.getElementById('d5');
const d6=document.getElementById('d6');

const video6=document.getElementById('video6');
const videoSource=document.getElementById('videoSource');
const spotify=document.getElementById('spotify');
const letter=document.getElementById('letter');

clue.textContent="clue : "+CONFIG.clue;

p1.src=CONFIG.photo1;
p2.src=CONFIG.photo2;

d4.textContent=CONFIG.slide4Text;
d5.textContent=CONFIG.slide5Text;
d6.textContent=CONFIG.slide6Text;

videoSource.src=CONFIG.video6;
video6.load();

spotify.src="https://open.spotify.com/embed/playlist/08NO2uDXFFD1LDQ8l7QPEo";

letter.textContent=CONFIG.letter;

// PIN render
function render(){
pin.innerHTML='';
for(let i=0;i<6;i++){
let b=document.createElement('div');
b.className='box';
b.textContent=p[i]?'•':'';
pin.appendChild(b);
}
}
render();

// keypad
[1,2,3,4,5,6,7,8,9,'⌫',0,'OK'].forEach(v=>{
let b=document.createElement('button');
b.textContent=v;
b.onclick=()=>press(v);
keys.appendChild(b);
});

function press(v){
if(v==='⌫'){p=p.slice(0,-1);render();return;}

if(v==='OK'){
if(p===CONFIG.password){
for(let i=0;i<20;i++)setTimeout(()=>console.log("💙"),i*80);
next();
}else{
alert("Password salah 😝");
p='';render();
}
return;
}

if(p.length<6){p+=v;render();}
}

function next(){
document.getElementById('s'+current).classList.remove('active');
current++;
document.getElementById('s'+current).classList.add('active');
}

</script>

</body>
</html>
